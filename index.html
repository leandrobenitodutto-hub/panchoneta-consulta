<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Panchoneta · Consulta por Fecha</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--bg:#0c0b09;--s1:#161410;--s2:#1e1b16;--s3:#252118;--border:#2e2a24;--border2:#3a342c;--mustard:#f0c040;--red:#e04848;--green:#48d888;--orange:#e87828;--blue:#4898e0;--purple:#a070e0;--teal:#40c8b0;--text:#ede8df;--text2:#b8b0a4;--muted:#706860;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;min-height:100vh;}

header{position:relative;padding:16px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--s1),var(--bg));overflow:hidden;}
header::before{content:'🌭';position:absolute;right:-40px;top:-60px;font-size:180px;opacity:.04;pointer-events:none;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--mustard),transparent);}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:var(--mustard);display:block;line-height:1;}
.logo-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:3px;display:block;}

/* FILTROS */
.filtros{padding:12px 16px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:12px;}
.filtro-group{display:flex;flex-direction:column;gap:6px;}
.filtro-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.filtro-input{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;transition:border-color .2s;width:100%;}
.filtro-input:focus{border-color:var(--mustard);}
.filtro-select{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;cursor:pointer;width:100%;}
.fechas-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.shortcuts{display:flex;gap:6px;flex-wrap:wrap;}
.sc{padding:8px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;font-weight:600;}
.sc.active{background:var(--mustard);color:#0c0b09;border-color:var(--mustard);}
.btn-consultar{padding:14px;background:var(--mustard);color:#0c0b09;border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;transition:opacity .2s;width:100%;}
.btn-consultar:disabled{opacity:.4;cursor:not-allowed;}

/* NAV */
nav{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--s1);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
nav::-webkit-scrollbar{display:none;}
.nb{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap;background:transparent;color:var(--muted);border:1px solid transparent;transition:all .2s;}
.nb.active{background:var(--mustard);color:#0c0b09;border-color:var(--mustard);}

main{padding:16px;max-width:1200px;}
.page{display:none;}.page.active{display:block;}
.section{margin-bottom:28px;}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--mustard);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.stitle::after{content:'';flex:1;height:1px;background:var(--border);margin-left:8px;}

/* ESTADO VACÍO / LOADING */
.estado{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);gap:12px;}
.estado-icon{font-size:48px;opacity:.4;}
.estado-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--muted);}
.estado-sub{font-size:12px;color:var(--border2);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--mustard);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* CARDS */
.kg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.kg4{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.kg3{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.kg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
@media(min-width:700px){.kg{grid-template-columns:repeat(4,1fr);}.kg4{grid-template-columns:repeat(4,1fr);}.kg3{grid-template-columns:repeat(3,1fr);}}
.kc{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kc.green::before{background:var(--green);}.kc.yellow::before{background:var(--mustard);}.kc.orange::before{background:var(--orange);}.kc.red::before{background:var(--red);}.kc.blue::before{background:var(--blue);}.kc.purple::before{background:var(--purple);}.kc.teal::before{background:var(--teal);}
.klbl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.kval{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;color:var(--text);}
.kval.sm{font-size:18px;}.kval.lg{font-size:36px;}
.ksub{font-size:11px;color:var(--muted);margin-top:4px;}
.kdelta{display:inline-flex;align-items:center;gap:3px;font-family:'DM Mono',monospace;font-size:10px;padding:2px 6px;border-radius:4px;margin-top:4px;}
.kdelta.up{background:rgba(72,216,136,.15);color:var(--green);}.kdelta.down{background:rgba(224,72,72,.15);color:var(--red);}

/* TABLAS */
.tw{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow-x:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
.tt{padding:10px 16px 8px;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
table.dt{width:100%;border-collapse:collapse;font-size:12px;}
table.dt th{text-align:left;padding:8px 14px;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
table.dt td{padding:8px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
table.dt tr:last-child td{border-bottom:none;}
table.dt tr:hover td{background:rgba(255,255,255,.02);}
.num{font-family:'DM Mono',monospace;font-size:11px;text-align:right;}th.num{text-align:right;}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.pg{background:rgba(72,216,136,.15);color:var(--green);}.pr{background:rgba(224,72,72,.15);color:var(--red);}.py{background:rgba(240,192,64,.15);color:var(--mustard);}.pb{background:rgba(72,152,224,.15);color:var(--blue);}

/* GRAFICOS */
.cgrid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:10px;}
@media(min-width:700px){.cgrid{grid-template-columns:1fr 1fr;}}
.cc{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.ctitle{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.cbox{position:relative;height:200px;}

/* PANCHO HERO */
.pancho-hero{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:block;margin-bottom:12px;position:relative;overflow:hidden;}
.pancho-hero::before{content:'🌭';position:absolute;right:-10px;top:-10px;font-size:60px;opacity:.06;}
.ph-lbl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.ph-val{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;color:var(--mustard);line-height:1;}
.ph-sub{font-size:11px;color:var(--muted);margin-top:4px;}

/* CANAL */
.canal-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:12px;}
@media(min-width:600px){.canal-grid{grid-template-columns:1fr 1fr;}}
.canal-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.canal-lbl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.canal-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;}
.canal-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.bar-bg{background:var(--border);border-radius:4px;height:8px;margin-top:10px;}
.bar-fill{height:100%;border-radius:4px;}

/* ACCIONES */
.acitem{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:flex-start;gap:14px;margin-bottom:10px;}
.acitem.danger{border-color:rgba(224,72,72,.35);background:rgba(224,72,72,.04);}
.acitem.warn{border-color:rgba(232,120,40,.35);background:rgba(232,120,40,.04);}
.acitem.ok{border-color:rgba(72,216,136,.35);background:rgba(72,216,136,.04);}
.acnum{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--mustard);line-height:1;flex-shrink:0;width:26px;}
.actitle{font-weight:600;font-size:13px;margin-bottom:4px;color:var(--text);}
.acdesc{font-size:12px;color:var(--text2);line-height:1.55;}

footer{padding:14px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;flex-wrap:wrap;gap:4px;}
</style>
</head>
<body>

<header>
  <div>
    <span class="logo-main">La Panchoneta</span>
    <span class="logo-sub">Consulta por Período · Villa María, Córdoba</span>
  </div>
  <div style="text-align:right">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--muted)" id="periodoLabel">Seleccioná un período</div>
    <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--border2)" id="generadoLabel"></div>
  </div>
</header>

<div class="filtros">
  <div class="filtro-group">
    <div class="filtro-label">Atajos</div>
    <div class="shortcuts">
      <button class="sc" onclick="setShortcut('hoy')">Hoy</button>
      <button class="sc" onclick="setShortcut('ayer')">Ayer</button>
      <button class="sc" onclick="setShortcut('semana')">Esta semana</button>
      <button class="sc" onclick="setShortcut('semana_ant')">Sem. anterior</button>
      <button class="sc" onclick="setShortcut('mes')">Este mes</button>
      <button class="sc" onclick="setShortcut('mes_ant')">Mes anterior</button>
      <button class="sc" onclick="setShortcut('ano')">Este año</button>
    </div>
  </div>
  <div class="filtro-group">
    <div class="filtro-label">Desde</div>
    <input type="date" class="filtro-input" id="inputDesde">
  </div>
  <div class="filtro-group">
    <div class="filtro-label">Hasta</div>
    <input type="date" class="filtro-input" id="inputHasta">
  </div>
  <div class="filtro-group">
    <div class="filtro-label">Sucursal</div>
    <select class="filtro-select" id="inputSucursal">
      <option value="">Todas las sucursales</option>
      <option value="Bv. Sarmiento">Casa Central (Bv. Sarmiento)</option>
      <option value="Terminal">Terminal de Ómnibus</option>
      <option value="Shopping">Villa María Shopping</option>
    </select>
  </div>
  <button class="btn-consultar" id="btnConsultar" onclick="consultar()">CONSULTAR</button>
</div>

<nav id="navBar" style="display:none">
  <button class="nb active" onclick="showPage('resumen',this)">📊 Resumen</button>
  <button class="nb" onclick="showPage('panchos',this)">🌭 Panchos</button>
  <button class="nb" onclick="showPage('productos',this)">📈 Productos</button>
  <button class="nb" onclick="showPage('combos',this)">🔗 Combos</button>
  <button class="nb" onclick="showPage('bebidas',this)">🥤 Bebidas</button>
  <button class="nb" onclick="showPage('delivery',this)">🛵 Delivery</button>
  <button class="nb" onclick="showPage('oportunidades',this)">🎯 Oportunidades</button>
  <button class="nb" onclick="showPage('acciones',this)">✅ Acciones</button>
</nav>

<main id="mainContent">
  <div class="estado">
    <div class="estado-icon">📊</div>
    <div class="estado-title">Seleccioná un período</div>
    <div class="estado-sub">Usá los atajos o ingresá fechas manualmente y presioná Consultar</div>
  </div>
</main>

<footer>
  <span>La Panchoneta · Villa María, Córdoba · Consulta por Período</span>
  <span id="footerInfo">—</span>
</footer>

<script>
const API_BASE = "https://api.lapanchoneta.com/api/ext";
const API_KEY = "pk_pancho_2026";

// ─── helpers ───────────────────────────────────────────────────────────────
const n$ = (n) => "$" + Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:0});
const nPct = (n) => Number(n||0).toFixed(1)+"%";
const nN = (n) => Number(n||0).toLocaleString("es-AR");
const today = () => { const d=new Date(); d.setHours(d.getHours()-3); return d.toISOString().slice(0,10); };
const mColor = (m) => m>=60?"#48d888":m>=45?"#f0c040":m>=30?"#e87828":"#e04848";
const isDelivery = (n) => { const s=(n||"").toLowerCase(); return s.includes("pedidos ya")||s.includes("pedix"); };
const esPancho = (n) => { const s=(n||"").replace(/pedidos\s*ya/gi,"").replace(/pedix/gi,"").toLowerCase(); return (s.includes("pancho")||s.includes("hot dog"))&&!s.includes("desperdicio"); };
const MULTS = [{r:/pancho\s*x\s*3|3\s*x\s*2\s*pancho/i,m:3},{r:/pancho\s*x\s*2|panchos?\s*x?\s*2/i,m:2}];
const getMult = (n) => { for(const x of MULTS) if(x.r.test(n)) return x.m; return 1; };

async function apiFetch(path) {
  const res = await fetch(API_BASE+path,{headers:{Authorization:"Bearer "+API_KEY}});
  if(!res.ok) throw new Error("API error "+res.status);
  const data = await res.json();
  if(Array.isArray(data)) return data;
  for(const k of Object.keys(data)) if(Array.isArray(data[k])) return data[k];
  return data;
}

// ─── shortcuts ─────────────────────────────────────────────────────────────
function setShortcut(tipo) {
  const t = today();
  // Crear fecha local correctamente para evitar desfase UTC
  const parts = t.split('-');
  const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  let desde, hasta;
  if(tipo==='hoy'){desde=hasta=t;}
  else if(tipo==='ayer'){const y=new Date(d);y.setDate(d.getDate()-1);desde=hasta=y.toISOString().slice(0,10);}
  else if(tipo==='semana'){const day=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-((day+6)%7));desde=`${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;hasta=t;}
  else if(tipo==='semana_ant'){const day=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-((day+6)%7)-7);const sun=new Date(mon);sun.setDate(mon.getDate()+6);desde=`${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;hasta=`${sun.getFullYear()}-${String(sun.getMonth()+1).padStart(2,'0')}-${String(sun.getDate()).padStart(2,'0')}`;}
  else if(tipo==='mes'){desde=t.slice(0,7)+"-01";hasta=t;}
  else if(tipo==='mes_ant'){const pm=new Date(d.getFullYear(),d.getMonth()-1,1);const ulm=new Date(d.getFullYear(),d.getMonth(),0);desde=`${pm.getFullYear()}-${String(pm.getMonth()+1).padStart(2,'0')}-01`;hasta=`${ulm.getFullYear()}-${String(ulm.getMonth()+1).padStart(2,'0')}-${String(ulm.getDate()).padStart(2,'0')}`;}
  else if(tipo==='ano'){desde=t.slice(0,4)+"-01-01";hasta=t;}
  document.getElementById("inputDesde").value=desde;
  document.getElementById("inputHasta").value=hasta;
  document.querySelectorAll(".sc").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

// ─── process data ──────────────────────────────────────────────────────────
function processVentas(raw) {
  const ventas = Array.isArray(raw)?raw:[];
  if(!ventas.length) return null;
  const total_ordenes = new Set(ventas.map(v=>v.orden_id)).size;
  const ingresos = ventas.reduce((s,v)=>s+(v.ingresos||0),0);
  const costo = ventas.reduce((s,v)=>s+(v.costo||0),0);
  const ganancia = ingresos-costo;
  const margen = ingresos>0?(ganancia/ingresos)*100:0;
  const ticket_prom = total_ordenes>0?ingresos/total_ordenes:0;

  const prodMap={};
  ventas.forEach(v=>{
    if(!prodMap[v.producto]) prodMap[v.producto]={nombre:v.producto,tipo:v.tipo,qty:0,ingresos:0,costo:0};
    prodMap[v.producto].qty+=v.cantidad||0;
    prodMap[v.producto].ingresos+=v.ingresos||0;
    prodMap[v.producto].costo+=v.costo||0;
  });
  const productos=Object.values(prodMap).map(p=>({...p,ganancia:p.ingresos-p.costo,margen:p.ingresos>0?((p.ingresos-p.costo)/p.ingresos)*100:0}));
  const topIngresos=[...productos].sort((a,b)=>b.ingresos-a.ingresos).slice(0,10);
  const topMargen=[...productos].sort((a,b)=>b.margen-a.margen).slice(0,10);
  const combos=productos.filter(p=>(p.tipo||"").toLowerCase()==="combo").sort((a,b)=>b.ingresos-a.ingresos);

  const panchosMap={};
  ventas.filter(v=>esPancho(v.producto)).forEach(v=>{
    const key=(v.producto||"").replace(/pedidos\s*ya/gi,"").replace(/pedix/gi,"").trim().toLowerCase();
    const label=(v.producto||"").replace(/pedidos\s*ya/gi,"").replace(/pedix/gi,"").trim();
    if(!panchosMap[key]) panchosMap[key]={nombre:label,qty:0,salon:0,delivery:0};
    const mult=getMult(v.producto);
    panchosMap[key].qty+=(v.cantidad||0)*mult;
    if(isDelivery(v.producto)) panchosMap[key].delivery+=(v.cantidad||0)*mult;
    else panchosMap[key].salon+=(v.cantidad||0)*mult;
  });
  const panchosList=Object.values(panchosMap).sort((a,b)=>b.qty-a.qty);
  const totalPanchos=panchosList.reduce((s,p)=>s+p.qty,0);
  const panchosDelivery=panchosList.reduce((s,p)=>s+p.delivery,0);
  const panchosSalon=panchosList.reduce((s,p)=>s+p.salon,0);

  const bebKw=["gaseosa","agua","jugo","cerveza","coca","sprite","fanta","7up","pepsi","manaos","powerade","monster","ades"];
  const esBeb=(n)=>bebKw.some(k=>(n||"").replace(/pedidos\s*ya/gi,"").toLowerCase().includes(k));
  const bebMap={};
  ventas.filter(v=>esBeb(v.producto)).forEach(v=>{
    const key=(v.producto||"").replace(/pedidos\s*ya/gi,"").replace(/pedix/gi,"").trim().toLowerCase();
    const label=(v.producto||"").replace(/pedidos\s*ya/gi,"").replace(/pedix/gi,"").trim();
    if(!bebMap[key]) bebMap[key]={nombre:label,qty:0,ingresos:0,costo:0};
    bebMap[key].qty+=v.cantidad||0;
    bebMap[key].ingresos+=v.ingresos||0;
    bebMap[key].costo+=v.costo||0;
  });
  const bebidas=Object.values(bebMap).map(p=>({...p,ganancia:p.ingresos-p.costo,margen:p.ingresos>0?((p.ingresos-p.costo)/p.ingresos)*100:0})).sort((a,b)=>b.ingresos-a.ingresos);

  const sucMap={};
  ventas.forEach(v=>{
    const k=v.sucursal||"Sin datos";
    if(!sucMap[k]) sucMap[k]={ordenes:new Set(),ingresos:0,costo:0};
    if(v.orden_id) sucMap[k].ordenes.add(v.orden_id);
    sucMap[k].ingresos+=v.ingresos||0;
    sucMap[k].costo+=v.costo||0;
  });

  const delV=ventas.filter(v=>isDelivery(v.producto));
  const salV=ventas.filter(v=>!isDelivery(v.producto));
  const sumC=arr=>{const i=arr.reduce((s,v)=>s+(v.ingresos||0),0);const c=arr.reduce((s,v)=>s+(v.costo||0),0);const g=i-c;return{ingresos:i,costo:c,ganancia:g,margen:i>0?(g/i)*100:0,ordenes:new Set(arr.map(v=>v.orden_id)).size};};

  const sq=[...productos].sort((a,b)=>a.qty-b.qty);
  const p25=sq[Math.floor(sq.length*0.25)]?.qty||0;
  const subex=productos.filter(p=>p.margen>35&&p.qty<=p25&&(p.tipo||"").toLowerCase()!=="combo").slice(0,6);

  // Panchos por sucursal
  const panchosSucMap={};
  ventas.filter(v=>esPancho(v.producto)).forEach(v=>{
    const k=v.sucursal||'Sin datos';
    if(!panchosSucMap[k]) panchosSucMap[k]={qty:0};
    panchosSucMap[k].qty+=(v.cantidad||0)*getMult(v.producto);
  });

  return{total_ordenes,ingresos,costo,ganancia,margen,ticket_prom,productos,topIngresos,topMargen,combos,panchosList,totalPanchos,panchosDelivery,panchosSalon,panchosSucMap,bebidas,sucMap,delivery:sumC(delV),salon:sumC(salV),subex};
}

const charts={};
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function mk(id,type,labels,datasets,opts={}){
  destroyChart(id);
  const el=document.getElementById(id);if(!el)return;
  charts[id]=new Chart(el,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#706860',boxWidth:12,padding:10}},tooltip:{backgroundColor:'#1e1b16',borderColor:'#2e2a24',borderWidth:1,titleColor:'#ede8df',bodyColor:'#b8b0a4'}},...opts}});

const sucColor=(k)=>{const l=(k||"").toLowerCase();if(l.includes("sarm")||l.includes("central"))return O;if(l.includes("shop"))return B;if(l.includes("term"))return P;return M;};
const sucLabel=(k)=>{const m={casa_central:"Casa Central",sarmiento:"Sarmiento",shopping:"Shopping","villa maría shopping":"Shopping",terminal:"Terminal","terminal de ómnibus":"Terminal"};return m[k.toLowerCase()]||k;};

}

// ─── main consultar ────────────────────────────────────────────────────────
async function consultar() {
  const desde = document.getElementById("inputDesde").value;
  const hasta = document.getElementById("inputHasta").value;
  const sucursal = document.getElementById("inputSucursal").value;

  if(!desde||!hasta){alert("Seleccioná las fechas");return;}

  const btn = document.getElementById("btnConsultar");
  btn.disabled=true; btn.textContent="CONSULTANDO...";

  document.getElementById("navBar").style.display="none";
  document.getElementById("mainContent").innerHTML=`<div class="estado"><div class="spinner"></div><div class="estado-title">Cargando datos</div><div class="estado-sub">${desde} → ${hasta}</div></div>`;

  try {
    const url=`/ventas?fecha_desde=${desde}&fecha_hasta=${hasta}`;
    let raw = await apiFetch(url);
    // Filtrar por sucursal en el frontend - comparación flexible
    if(sucursal) raw = Array.isArray(raw) ? raw.filter(v => {
      const s = (v.sucursal || "").trim().toLowerCase();
      const f = sucursal.trim().toLowerCase();
      return s === f || s.includes(f) || f.includes(s);
    }) : raw;
    const data = processVentas(raw);
    if(!data){
      document.getElementById("mainContent").innerHTML=`<div class="estado"><div class="estado-icon">📭</div><div class="estado-title">Sin datos</div><div class="estado-sub">No hay ventas registradas para el período ${desde} → ${hasta}</div></div>`;
      return;
    }
    renderData(data, desde, hasta);
  } catch(e) {
    document.getElementById("mainContent").innerHTML=`<div class="estado"><div class="estado-icon">⚠️</div><div class="estado-title">Error al cargar</div><div class="estado-sub">${e.message}</div></div>`;
  } finally {
    btn.disabled=false; btn.textContent="CONSULTAR";
  }
}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const page=document.getElementById('page-'+id);
  if(page) page.classList.add('active');
  if(btn) btn.classList.add('active');
}

document.getElementById("inputHasta").value=today();

Chart.defaults.font.family="'DM Sans',sans-serif";
Chart.defaults.font.size=11;
